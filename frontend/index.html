<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI 3D Learning System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <h1>🧠 AI 3D Learning System</h1>

    <!-- ---------- 3D GENERATOR ---------- -->
    <div class="card">

        <h2>3D Generator</h2>

        <div class="controls">
            <input id="inputText" placeholder="e.g. construction helmet, robot arm" />
            <button onclick="generate()">Generate</button>
        </div>

        <p id="status"></p>

        <canvas id="canvas"></canvas>

        <div class="output">
            <h3>Explanation</h3>
            <p id="explanation"></p>
        </div>

    </div>

    <!-- ---------- AVATAR ---------- -->
    <div class="card">

        <h2>AI Avatar</h2>

        <div class="controls">
            <input id="avatarCommand" placeholder="e.g. walk, wave, point" />
            <button onclick="controlAvatar()">Run</button>
        </div>

        <p id="avatarStatus"></p>

        <div class="output">
            <h3>Avatar Explanation</h3>
            <p id="avatarExplanation"></p>
        </div>

    </div>

</div>

<!-- THREE -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<!-- LOADER -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>

<!-- CONTROLS (IMPORTANT 🔥) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script src="script.js"></script>

</body>
</html>
